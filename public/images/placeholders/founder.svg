<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" role="img" aria-label="Founder portrait placeholder">
  <defs>
    <linearGradient id="skin-tone" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f4d4b8" />
      <stop offset="100%" stop-color="#e8c8a8" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="400" height="500" fill="#f1ede3"/>
  
  <!-- Head -->
  <circle cx="200" cy="120" r="50" fill="url(#skin-tone)"/>
  
  <!-- Body -->
  <rect x="140" y="170" width="120" height="200" rx="20" fill="#012d1d"/>
  
  <!-- Face shadows -->
  <ellipse cx="185" cy="115" rx="12" ry="15" fill="#e8c8a8" opacity="0.3"/>
  <ellipse cx="215" cy="115" rx="12" ry="15" fill="#f4d4b8" opacity="0.3"/>
  
  <!-- Eyes placeholder -->
  <circle cx="190" cy="110" r="4" fill="#333"/>
  <circle cx="210" cy="110" r="4" fill="#333"/>
  
  <!-- Decorative accent -->
  <rect x="0" y="380" width="400" height="120" fill="#c1f100" opacity="0.1"/>
</svg>